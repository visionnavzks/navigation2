<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Smoother Tuner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Path Smoother Tuning Dashboard</h1>
            <p>Dynamically adjust weights and constraints for nonlinear path optimization</p>
        </header>
        
        <div class="main-layout">
            <aside class="sidebar glass-panel">
                <h2>Parameters</h2>
                <form id="tune-form">
                    <details open>
                        <summary>Start State</summary>
                        <div class="param-group">
                            <label>X: <span id="val_start_x">0.00</span></label>
                            <input type="range" id="start_x" min="-5.0" max="25.0" step="0.1" value="0.0">
                        </div>
                        <div class="param-group">
                            <label>Y: <span id="val_start_y">0.00</span></label>
                            <input type="range" id="start_y" min="-10.0" max="10.0" step="0.1" value="0.0">
                        </div>
                        <div class="param-group">
                            <label>Theta (rad): <span id="val_start_theta">0.00</span></label>
                            <input type="range" id="start_theta" min="-3.14" max="3.14" step="0.01" value="0.0">
                        </div>
                    </details>

                    <details open>
                        <summary>Goal State</summary>
                        <div class="param-group">
                            <label>X: <span id="val_goal_x">20.00</span></label>
                            <input type="range" id="goal_x" min="-5.0" max="25.0" step="0.1" value="20.0">
                        </div>
                        <div class="param-group">
                            <label>Y: <span id="val_goal_y">0.00</span></label>
                            <input type="range" id="goal_y" min="-10.0" max="10.0" step="0.1" value="0.0">
                        </div>
                        <div class="param-group">
                            <label>Theta (rad): <span id="val_goal_theta">0.00</span></label>
                            <input type="range" id="goal_theta" min="-3.14" max="3.14" step="0.01" value="0.0">
                        </div>
                    </details>

                    <details open>
                        <summary>Algorithm Parameters</summary>

                    <div class="param-group">
                        <label>Max Curvature: <span id="val_max_kappa">0.5</span></label>
                        <input type="range" id="max_kappa" min="0.05" max="2.0" step="0.05" value="0.5">
                    </div>
                    <div class="param-group">
                        <label>Target Spacing: <span id="val_target_ds">0.40</span></label>
                        <input type="range" id="target_ds" min="0.0" max="1.5" step="0.05" value="0.4">
                    </div>



                    <div class="param-group">
                        <label>Ref Weight (w_ref): <span id="val_w_ref">10.0</span></label>
                        <input type="range" id="w_ref" min="0.0" max="50.0" step="1.0" value="10.0">
                    </div>
                    <div class="param-group">
                        <label>Smooth Weight (w_dkappa): <span id="val_w_dkappa">10.0</span></label>
                        <input type="range" id="w_dkappa" min="0.0" max="50.0" step="1.0" value="10.0">
                    </div>
                    <div class="param-group">
                        <label>Curvature Weight (w_kappa): <span id="val_w_kappa">0.1</span></label>
                        <input type="range" id="w_kappa" min="0.0" max="10.0" step="0.1" value="0.1">
                    </div>
                    <div class="param-group">
                        <label>Step Weight (w_ds): <span id="val_w_ds">1.0</span></label>
                        <input type="range" id="w_ds" min="0.0" max="20.0" step="0.5" value="1.0">
                    </div>

                    </details>
                    
                    <button type="button" id="run-btn" class="glow-btn">Run Optimization</button>

                    <div id="status-msg" class="status-msg"></div>
                </form>
            </aside>
            
            <section class="charts glass-panel">
                <div class="top-info-bar">
                    <div class="info-badge">
                        <span class="label">Turning Radius:</span>
                        <span id="display-turning-radius" class="value">--</span>
                        <span class="unit">m</span>
                    </div>
                    <div class="divider"></div>
                    <div id="dubins-commands-list" class="commands-hbar">
                        <p class="empty-msg">No path generated yet.</p>
                    </div>
                </div>
                
                <div id="path-chart" class="chart-container"></div>
                <div id="kappa-chart" class="chart-container" style="height: 250px;"></div>
                <div id="ds-chart" class="chart-container" style="height: 250px;"></div>
                <div id="dk-chart" class="chart-container" style="height: 250px;"></div>
            </section>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
